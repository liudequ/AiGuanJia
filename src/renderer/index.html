<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AiGuanJia</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <h1>AiGuanJia V1</h1>
      <section class="panel">
        <h2>项目组</h2>
        <p id="project-group-status">未选择项目组</p>
        <div id="project-group-root"></div>
      </section>
      <section class="panel">
        <h2>Agent</h2>
        <button id="agent-add-btn" type="button">新增 Agent</button>
        <p id="agent-status">就绪</p>
        <div id="agent-root"></div>
      </section>
      <section class="panel">
        <h2>流程模板</h2>
      </section>
      <section class="panel">
        <h2>运行中心</h2>
        <button id="run-flow-btn" type="button">运行</button>
        <p id="status-text">就绪</p>
        <ul id="runs-list"></ul>
      </section>
    </main>
    <script>
      window.exports = {};
      window.module = { exports: window.exports };
    </script>
    <script src="./app.js"></script>
  </body>
</html>
